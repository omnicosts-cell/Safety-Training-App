<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Construction Safety Training</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===================== HOME SCREEN ===================== -->
  <div id="home-screen" class="screen active">

    <header class="home-header">
      <div class="header-inner">
        <div class="header-badge">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="header-title">Construction Safety Training</h1>
          <p class="header-subtitle">Select a hazard to begin training</p>
        </div>
      </div>
      <div class="header-stripe"></div>
    </header>

    <main class="home-main">
      <div class="section-label">
        <span class="label-line"></span>
        <span class="label-text">HAZARD MODULES</span>
        <span class="label-line"></span>
      </div>

      <div class="hazard-grid" id="hazard-grid">
        <!-- Cards injected by script.js -->
      </div>

      <footer class="home-footer">
        <p>All workers must complete training before site entry &bull; Safety First</p>
      </footer>
    </main>

  </div>

  <!-- ===================== TRAINING SCREEN ===================== -->
  <div id="training-screen" class="screen">

    <header class="training-header">
      <button class="back-btn" id="back-btn" aria-label="Go back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>BACK</span>
      </button>
      <div class="training-title-wrap">
        <span class="training-hazard-icon" id="training-hazard-icon"></span>
        <h2 class="training-title" id="training-title">Hazard Name</h2>
      </div>
      <div class="training-badge">
        <span>LIVE TRAINING</span>
        <span class="pulse-dot"></span>
      </div>
    </header>

    <div class="training-body">

      <!-- Media Zone -->
      <div class="media-zone">
        <div class="media-label" id="media-label">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          HAZARD SCENARIO
        </div>

        <!-- Hazard Image -->
        <div class="hazard-image-wrap" id="hazard-image-wrap">
          <img id="hazard-image" src="" alt="Hazard scenario" class="hazard-image" />
          <div class="image-overlay-tag" id="image-overlay-tag">⚠ IDENTIFY THE RISK</div>
        </div>

        <!-- Video Player -->
        <div class="video-wrap hidden" id="video-wrap">
          <div class="video-type-tag" id="video-type-tag">SAFE SCENARIO</div>
          <video id="training-video" class="training-video" controls playsinline>
            <source id="video-source" src="" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>
      </div>

      <!-- Question Block -->
      <div class="question-block" id="question-block">
        <div class="question-number">Q1</div>
        <p class="question-text">What is the correct action in this situation?</p>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons" id="action-buttons">
        <button class="action-btn btn-safe" id="btn-safe">
          <span class="btn-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </span>
          <span class="btn-label">SAFE SCENARIO</span>
          <span class="btn-sub">View correct procedure</span>
        </button>

        <button class="action-btn btn-unsafe" id="btn-unsafe">
          <span class="btn-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </span>
          <span class="btn-label">UNSAFE SCENARIO</span>
          <span class="btn-sub">View what NOT to do</span>
        </button>
      </div>

      <!-- Replay / Reset -->
      <div class="video-controls hidden" id="video-controls">
        <button class="ctrl-btn" id="btn-replay">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
          </svg>
          REPLAY
        </button>
        <button class="ctrl-btn ctrl-btn-outline" id="btn-show-image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          BACK TO IMAGE
        </button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
